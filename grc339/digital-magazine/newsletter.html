<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="stylesheet" type="text/css" href="style.css">
      <title>The Lineup</title>
      <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
      <meta http-equiv="Pragma" content="no-cache" />
      <meta http-equiv="Expires" content="0" />
      <link rel="stylesheet" href="https://use.typekit.net/zxw5xar.css">
   </head>
   <body>
      <div class="newsletter-container">
         <header>
            <h1 class="newsletter"><a href="index.html"><img src="TheLineupLogo.svg" alt="The Lineup" /></a></h1>
            <nav>
               <ul>
                  <li><a href="#">Eats</a></li>
                  <li><a href="#">Sips</a></li>
                  <li><a href="#">Drops</a></li>
                  <li><a href="#">Map</a></li>
                  <li><a href="newsletter.html">Tune In</a></li>
               </ul>
            </nav>
         </header>
         <main>
            <figure>
               <img src="Newsletter.jpg" alt="A glowing two-story festival venue packed with crowds on the grass field at Coachella during sunset, with a dramatic A-frame roof structure lit from within.">
            </figure>
            <form>
            <section class="subscribe">
               <h2>Subscribe to our Newsletter!</h2>
               <ul class="newsletter">
                   <li><label for="name">Name:</label> <input type="text" name="name" id="name" placeholder="your full name" /></li>
                   <li><label for="email-address">Email:</label> <input type="email" name="email-address" id="email-address" placeholder="your email address" /></li>
               </ul>
            <h3>What are you into?</h3>
               <p>Pick everything that sounds good!</p>
               <ul class="newsletter">
                  <li>
                     <input type="checkbox" id="eats" value="eats" />
                     <label for="eats">Eats: the best bites on the grounds.</label>
                  </li>
                  <li>
                     <input type="checkbox" id="sips" value="sips" />
                     <label for="sips">Sips: cocktails, coffee & everything cold.</label>
                  </li>
                  <li>
                     <input type="checkbox" id="drops" value="drops" />
                     <label for="drops">Drops: new vendors & unlimited collabs.</label>
                  </li>
               </ul>
               <ul class="newsletter">
                  <li>
                     <button type="submit">Sign Me Up</button>
                  </li>
               </ul>
            </section>
         </form>
         </main>
         <footer>
            <p class="footer">All rights reserved.</p>
         </footer>
      </div>
   </body>
</html>
